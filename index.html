<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SPE ISV App Journey — Prototype: Fabrikam DocuFlow</title>
<style>
  :root{
    --spe:#0F6CBD; --spe-dark:#0a4d87; --ink:#202a44; --grey:#5a5a5a;
    --line:#e3e6ea; --bg:#f3f4f6; --ok:#107c41; --rail:#faf9f8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);
       display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* ---------- top header ---------- */
  header.app{background:var(--ink);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:16px;flex:0 0 auto}
  header.app .brand{font-weight:700;font-size:15px;letter-spacing:.2px;white-space:nowrap}
  header.app .brand b{color:#7fc1ff}
  .phases{display:flex;gap:6px;align-items:center;flex:1 1 auto;flex-wrap:wrap}
  .pchip{font-size:12px;padding:5px 12px;border-radius:20px;background:#33405e;color:#c7d0e2;white-space:nowrap}
  .pchip.active{background:var(--spe);color:#fff;font-weight:600}
  .pchip.done{background:#274;color:#bfe9cf}
  .legend{font-size:11px;color:#9fb0cf}

  /* ---------- layout ---------- */
  main{flex:1 1 auto;display:grid;grid-template-columns:248px 1fr 320px;min-height:0}
  /* journey rail */
  .rail{background:var(--rail);border-right:1px solid var(--line);overflow:auto;padding:10px 0}
  .rail .grp{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);
             padding:12px 16px 4px;font-weight:700}
  .rail .step{display:flex;gap:10px;align-items:flex-start;padding:7px 14px;cursor:pointer;font-size:12.5px;color:#3a4254}
  .rail .step:hover{background:#eef1f4}
  .rail .step .dot{flex:0 0 auto;width:18px;height:18px;border-radius:50%;border:2px solid #c4ccd6;
                   font-size:10px;line-height:14px;text-align:center;color:#8a93a0;margin-top:1px}
  .rail .step.active{background:#e8f1fb}
  .rail .step.active .lbl{color:var(--spe);font-weight:700}
  .rail .step.active .dot{border-color:var(--spe);color:var(--spe)}
  .rail .step.done .dot{background:var(--ok);border-color:var(--ok);color:#fff}

  /* stage */
  .stagewrap{display:flex;flex-direction:column;min-width:0;background:#dfe2e7}
  .progress{height:4px;background:#cdd2da;flex:0 0 auto}
  .progress > i{display:block;height:100%;background:var(--spe);transition:width .25s}
  .browser{flex:1 1 auto;margin:14px;background:#fff;border-radius:10px;box-shadow:0 6px 22px rgba(20,30,60,.18);
           display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .chrome{flex:0 0 auto;background:#edf0f3;border-bottom:1px solid #dfe3e8;padding:8px 12px;display:flex;gap:10px;align-items:center}
  .dots{display:flex;gap:6px}.dots i{width:11px;height:11px;border-radius:50%;display:block}
  .dots i:nth-child(1){background:#ff5f57}.dots i:nth-child(2){background:#febc2e}.dots i:nth-child(3){background:#28c840}
  .url{flex:1 1 auto;background:#fff;border:1px solid #d7dce2;border-radius:16px;padding:5px 14px;font-size:12px;color:#43506a;
       white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .url b{color:var(--ink)}
  .screen{flex:1 1 auto;overflow:auto;position:relative;background:#fff;display:flex;flex-direction:column}
  /* make admin-center style surfaces fill the full height of the browser frame */
  .fullsurface{flex:1 1 auto;display:flex;flex-direction:column;min-height:100%}
  .fullsurface .adminbody{flex:1 1 auto;display:flex;flex-direction:column;position:relative}
  .fullsurface .adminbody .adminlayout{flex:1 1 auto}
  .fullsurface > .content{flex:1 1 auto}
  .fullsurface .wizfill{flex:1 1 auto;display:flex;flex-direction:column}
  .fullsurface .wizfill .wizwrap{flex:1 1 auto}

  /* notes panel */
  .notes{background:#fff;border-left:1px solid var(--line);overflow:auto;padding:18px}
  .notes h3{margin:0 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--spe)}
  .notes .sub{font-size:12px;color:var(--grey);margin-bottom:14px}
  .notes .card{background:#f3f8fd;border:1px solid #d9e8f6;border-left:4px solid var(--spe);border-radius:8px;
               padding:12px 13px;font-size:13px;line-height:1.5;margin-bottom:12px}
  .notes .card.amber{background:#fff8ec;border-color:#f3e2c2;border-left-color:#d98a00}
  .notes .card.green{background:#eef9f1;border-color:#cdeBD6;border-left-color:var(--ok)}
  .notes .card b{color:var(--ink)}
  .kv{font-size:12px;color:#3a4254;margin:2px 0}
  .kv b{color:var(--ink)}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;background:#e8f1fb;color:var(--spe);margin-bottom:8px}

  /* footer nav */
  footer.nav{flex:0 0 auto;background:#fff;border-top:1px solid var(--line);padding:10px 18px;display:flex;gap:12px;align-items:center}
  footer.nav .spacer{flex:1 1 auto}
  .btn{font-family:inherit;font-size:13px;border-radius:6px;border:1px solid #c4ccd6;background:#fff;color:var(--ink);
       padding:8px 16px;cursor:pointer;font-weight:600}
  .btn:hover{background:#f3f4f6}
  .btn.primary{background:var(--spe);border-color:var(--spe);color:#fff}
  .btn.primary:hover{background:var(--spe-dark)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .counter{font-size:12px;color:var(--grey)}

  /* ===== shared surface bits used inside screens ===== */
  .mslogo{display:inline-grid;grid-template-columns:1fr 1fr;gap:1.5px;width:18px;height:18px;vertical-align:middle}
  .mslogo i{display:block}
  .mslogo i:nth-child(1){background:#F25022}.mslogo i:nth-child(2){background:#7FBA00}
  .mslogo i:nth-child(3){background:#00A4EF}.mslogo i:nth-child(4){background:#FFB900}

  /* SharePoint / M365 admin surfaces */
  .adminbar{background:#0b0b0b;color:#fff;padding:9px 16px;font-size:13px;display:flex;align-items:center;gap:10px}
  .adminbar .ttl{font-weight:600}
  .adminbar .right{margin-left:auto;display:flex;gap:14px;color:#cfcfcf;font-size:12px;align-items:center}
  .adminlayout{display:grid;grid-template-columns:210px 1fr}
  .leftnav{background:#faf9f8;border-right:1px solid #edebe9;padding:8px 0;font-size:13px;min-height:420px}
  .leftnav .ni{padding:6px 16px;color:#3a3a3a;cursor:default}
  .leftnav .ni.head{font-weight:600;color:#201f1e}
  .leftnav .ni.sel{background:#eef1f4;border-left:3px solid var(--spe);color:var(--spe);font-weight:600;padding-left:13px}
  .leftnav .ni.sub{padding-left:30px;color:#555}
  .content{padding:22px 26px}
  .content h1{font-size:22px;margin:0 0 6px}
  .muted{color:var(--grey);font-size:13px}
  .lnk{color:var(--spe);text-decoration:none}.lnk:hover{text-decoration:underline}
  .tabs{display:flex;gap:22px;border-bottom:1px solid var(--line);margin:16px 0 0}
  .tabs .t{padding:8px 2px;font-size:13px;color:#555;cursor:pointer;border-bottom:2px solid transparent}
  .tabs .t.on{color:var(--spe);border-color:var(--spe);font-weight:600}
  table.grid{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}
  table.grid th{text-align:left;color:#555;font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line)}
  table.grid td{padding:9px 10px;border-bottom:1px solid #f0f1f3}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ok);font-weight:600}
  .pill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .av{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--spe);color:#fff;text-align:center;
      line-height:22px;font-size:11px;font-weight:700}
  .createbtn{color:var(--spe);font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-top:14px}
  .createbtn:hover{text-decoration:underline}

  /* slide-out panel */
  .panel{position:absolute;top:0;right:0;bottom:0;width:430px;background:#fff;box-shadow:-8px 0 26px rgba(0,0,0,.18);
         padding:20px 22px;overflow:auto;border-left:1px solid var(--line)}
  .panel h2{font-size:18px;margin:0 0 4px}
  .panel .ph{font-size:12.5px;color:var(--grey);margin-bottom:16px}
  .scrim{position:absolute;inset:0;background:rgba(20,25,40,.18)}
  .field{margin:14px 0}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px}
  .field .desc{font-size:11.5px;color:var(--grey);margin-top:3px}
  .inp{width:100%;border:1px solid #c4ccd6;border-radius:5px;padding:8px 10px;font-size:13px;font-family:inherit}
  .radio{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border:1px solid #d7dce2;border-radius:6px;margin:7px 0;font-size:12.5px}
  .radio.sel{border-color:var(--spe);background:#f3f8fd}
  .radio .rb{flex:0 0 auto;width:15px;height:15px;border-radius:50%;border:2px solid #b4bcc8;margin-top:1px}
  .radio.sel .rb{border-color:var(--spe);background:radial-gradient(var(--spe) 40%,#fff 46%)}
  .infobox{background:#f3f4f6;border-radius:6px;padding:9px 11px;font-size:11.5px;color:#444;margin:8px 0}
  .panel .acts{position:sticky;bottom:-20px;background:#fff;padding:14px 0 2px;margin-top:14px;border-top:1px solid var(--line);display:flex;gap:10px}

  /* marketplace surface */
  .mkbar{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid #eee;font-size:13px}
  .mkbar .mk{font-weight:600}.mkbar .sep{color:#bbb}
  .mkbar .si{margin-left:auto;border:1px solid #d7dce2;border-radius:5px;padding:5px 14px;font-size:12px;color:#333}
  .hero{background:linear-gradient(120deg,#1b3a8f,#0f6cbd 55%,#5b3a9e);color:#fff;padding:46px 24px;text-align:center}
  .hero h2{font-size:30px;margin:0 0 8px}
  .hero p{margin:0 0 18px;opacity:.92;font-size:14px}
  .search{max-width:520px;margin:0 auto;display:flex;background:#fff;border-radius:6px;overflow:hidden}
  .search input{flex:1;border:0;padding:11px 14px;font-size:13px;font-family:inherit}
  .search .go{background:#eee;border:0;padding:0 14px;font-size:13px}
  .feat{padding:22px 26px}
  .feat h3{text-align:center;font-size:18px;margin:0 0 14px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .pcard{border:1px solid var(--line);border-radius:8px;padding:14px;cursor:pointer;background:#fff}
  .pcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
  .pcard.hot{border-color:var(--spe);box-shadow:0 0 0 2px #cfe6fa}
  .pcard .ic{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
  .pcard .nm{font-size:13px;font-weight:600;margin-top:9px}
  .pcard .by{font-size:11px;color:var(--grey)}

  /* product detail */
  .pdp{padding:22px 26px;display:grid;grid-template-columns:1fr 230px;gap:22px}
  .pdp .crumb{font-size:12px;color:var(--grey);margin-bottom:14px;grid-column:1/3}
  .pdhead{display:flex;gap:18px;align-items:flex-start}
  .pdhead .ic{width:78px;height:78px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:30px}
  .pdhead h2{margin:0 0 4px;font-size:22px}
  .pdmeta{font-size:12.5px;color:var(--grey)}
  .pdbtns{margin-top:12px;display:flex;gap:10px;align-items:center}
  .price{font-size:13px;color:#333;align-self:center}
  .siderail{font-size:11.5px;color:#666;border-left:1px solid var(--line);padding-left:16px;line-height:1.5}

  /* generic modal in marketplace */
  .mwrap{position:absolute;inset:0;background:rgba(20,25,40,.45);display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:#fff;border-radius:8px;max-width:430px;width:100%;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 14px;font-size:17px}
  .modal .close{float:right;color:#888;cursor:default;font-size:16px}
  .signrow{display:flex;gap:12px;align-items:center;margin:10px 0}
  .signrow .ic{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .consent{font-size:11.5px;color:#555;background:#f6f7f9;border-radius:6px;padding:10px;margin:12px 0;line-height:1.5}
  .loaddots{display:flex;gap:7px;justify-content:center;margin:16px 0}
  .loaddots i{width:10px;height:10px;border-radius:50%;background:var(--spe);animation:bl 1s infinite alternate}
  .loaddots i:nth-child(2){animation-delay:.2s}.loaddots i:nth-child(3){animation-delay:.4s}
  .loaddots i:nth-child(4){animation-delay:.6s}.loaddots i:nth-child(5){animation-delay:.8s}
  @keyframes bl{from{opacity:.25}to{opacity:1}}

  /* ISV landing */
  .isvhero{background:linear-gradient(120deg,#0b2a52,#123a6b);color:#fff;padding:42px 26px;text-align:center}
  .isvhero .lg{font-size:13px;letter-spacing:1px;opacity:.85;margin-bottom:14px}
  .isvhero h2{font-size:26px;margin:0 0 6px}.isvhero p{opacity:.9;margin:0}
  .admins{padding:30px 26px;text-align:center}
  .admins h3{font-size:18px;margin:0 0 22px}
  .admincols{display:flex;gap:50px;justify-content:center;flex-wrap:wrap}
  .admincols .c{max-width:230px}.admincols .c .q{font-weight:600;margin-bottom:10px}
  .pillbtn{display:inline-block;border-radius:20px;padding:9px 22px;font-size:13px;font-weight:600;cursor:pointer}
  .pillbtn.dark{background:#2b2b2b;color:#fff}.pillbtn.dark:hover{background:#000}
  .pillbtn.lite{background:#fff;border:1px solid #bbb;color:#222}

  /* MAC wizard */
  .wizwrap{display:grid;grid-template-columns:230px 1fr}
  .wizsteps{padding:18px 16px;font-size:13px}
  .wizsteps .ws{display:flex;gap:10px;align-items:center;padding:9px 4px;color:#555}
  .wizsteps .ws .n{width:18px;height:18px;border-radius:50%;border:2px solid #c4ccd6;font-size:10px;line-height:15px;text-align:center;color:#999}
  .wizsteps .ws.on{color:var(--spe);font-weight:600}.wizsteps .ws.on .n{border-color:var(--spe);color:var(--spe)}
  .wizsteps .ws.ok .n{background:var(--ok);border-color:var(--ok);color:#fff}
  .wizbody{padding:20px 26px;border-left:1px solid var(--line)}
  .wizbody h2{margin:0 0 4px;font-size:19px;display:flex;align-items:center;gap:10px}
  .permlist{font-size:12.5px;color:#444;line-height:1.7;margin:12px 0;padding-left:18px}
  .permlist li.spe{color:var(--spe);font-weight:600}

  /* mode switch + billing surfaces */
  .modeswitch{display:flex;border:1px solid #33405e;border-radius:20px;overflow:hidden;font-size:11px;margin-left:auto}
  .modeswitch button{background:#33405e;color:#c7d0e2;border:0;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:11px;white-space:nowrap}
  .modeswitch button.on{background:var(--spe);color:#fff;font-weight:700}
  .warnbar{background:#fff4ce;border:1px solid #f2d98e;border-left:4px solid #d98a00;border-radius:6px;padding:11px 13px;font-size:13px;margin:14px 0;line-height:1.5;max-width:640px}
  .okbar{background:#eef9f1;border:1px solid #cdebd6;border-left:4px solid var(--ok);border-radius:6px;padding:11px 13px;font-size:13px;margin:14px 0;line-height:1.5;max-width:640px}
  .billcard{border:1px solid var(--line);border-radius:8px;padding:16px;max-width:560px;margin-top:16px;background:#fff}
  .prereq{list-style:none;padding:0;margin:10px 0;font-size:12.5px}
  .prereq li{padding:3px 0;color:#3a4254}
  .prereq li b{color:var(--ok)}
  .apptag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;margin-left:8px;vertical-align:middle}
  .apptag.pass{background:#fdeede;color:#b06a00}
  .apptag.std{background:#e8f1fb;color:var(--spe)}
  .warnpill{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#b06a00;font-weight:600}
  .warnpill::before{content:"";width:8px;height:8px;border-radius:50%;background:#d98a00}
  .basics{display:flex;gap:40px;margin-top:18px;font-size:12.5px;flex-wrap:wrap}
  .basics div b{display:block;color:#333}
  .acceptrow{display:flex;justify-content:flex-end;margin-top:10px}
  .doneic{width:64px;height:64px;border-radius:50%;background:var(--ok);color:#fff;font-size:34px;display:flex;align-items:center;justify-content:center;margin:6px auto 14px}
  .recap{font-size:12.5px;line-height:1.7;color:#444;max-width:560px;margin:0 auto}
  .recap b{color:var(--ink)}
  .center{text-align:center}
</style>
</head>
<body>
<header class="app">
  <div class="brand">SPE ISV App Journey · <b>Prototype</b></div>
  <div class="phases" id="phases"></div>
  <div class="modeswitch" id="modeswitch" title="Switch the app's billing model to see how the consuming-tenant install flow changes">
    <button data-m="passthrough">Direct-to-customer billed</button>
    <button data-m="standard">Standard (owner-billed)</button>
  </div>
  <div class="legend">Fabrikam <b>DocuFlow</b> → Contoso</div>
</header>

<main>
  <nav class="rail" id="rail"></nav>

  <section class="stagewrap">
    <div class="progress"><i id="bar"></i></div>
    <div class="browser">
      <div class="chrome">
        <div class="dots"><i></i><i></i><i></i></div>
        <div class="url" id="url"></div>
      </div>
      <div class="screen" id="screen"></div>
    </div>
  </section>

  <aside class="notes" id="notes"></aside>
</main>

<footer class="nav">
  <button class="btn" id="back">← Back</button>
  <button class="btn" id="restart">↺ Restart</button>
  <div class="spacer"></div>
  <span class="counter" id="counter"></span>
  <button class="btn primary" id="next">Next →</button>
</footer>

<script>
/* ===================== data ===================== */
const APP = {
  isv:"Fabrikam, Inc.", name:"Fabrikam DocuFlow", color:"#0F6CBD",
  entraName:"Application_SPE_DocuFlow",
  entraId:"7c9e6679-7425-40de-944b-e07fc1f90ae7",
  speId:"8d37bd98-90d1-4d8c-822e-ee248fd1a5ab",
  ctName:"DocuFlow Standard Workspace",
  ctId:"3a6b8c2e-1f4d-4e9a-bb12-9f0c7d5e1a22",
  sub:"f65f082d-a073-4451-9a3b-235595ef2cd8",
  consumer:"Contoso Energy USA", domain:"contosoenergyusa40.onmicrosoft.com",
  admin:"Alex Wilber", adminUpn:"alexw@contosoenergyusa40.onmicrosoft.com"
};
const ic = (sz,fs)=>`<div class="ic" style="background:${APP.color};width:${sz};height:${sz};font-size:${fs}">DF</div>`;

/* phase 1 = Register (owning), 2 = Publish/List (owning), 3 = Discover & Install (consuming) */
function buildScreens(){
const pass = isPass();
const S = [
/* 0 */ {phase:1, rail:"SharePoint admin center · Owned apps", tab:"SharePoint admin center",
  url:`<b>admin.microsoft.com</b>/sharepoint &nbsp;›&nbsp; SharePoint Embedded ›  Apps`,
  body: spacApps(false, null, 1),
  note: noteCard("tag:Owning tenant — Fabrikam","Where the ISV starts",
    `<div class="card"><b>The ISV registers its app in its own (owning) tenant.</b> In the SharePoint admin center, <b>SharePoint Embedded → Apps → Owned apps</b> lists every SPE app your org created, regardless of where it is installed.</div>
     <div class="card"><b>Next action:</b> click <b>+ Create app</b> to register the DocuFlow application and define how it is billed.</div>`),
  cta:"Click “+ Create app”"},

/* 1 */ {phase:1, rail:"Create app — registration & billing", tab:"SharePoint admin center",
  url:`<b>admin.microsoft.com</b>/sharepoint &nbsp;›&nbsp; Apps › Create app`,
  body: spacApps(true, createPanelTop()),
  note: noteCard("tag:Owning tenant — Fabrikam","Register the Entra app",
    `<div class="card"><b>Create app</b> registers a Microsoft Entra application and creates the matching SharePoint Embedded app in one step.</div>
     <div class="kv"><b>Entra app name:</b> ${APP.entraName}</div>
     <div class="card amber"><b>Billing type (cannot be changed later):</b><br><b>User org</b> = the org <i>using</i> the app pays (pay-as-you-go set up by the consuming tenant). This makes it a <b>direct-to-customer billed app</b>. Best for ISV “sell-to-many”.<br><b>Owner org</b> = the developer pays via its own Azure subscription — a <b>standard app</b>. Typical for line-of-business apps.</div>
     ${pass
       ? `<div class="card"><b>DocuFlow chooses “User org” (direct-to-customer)</b> so each enterprise owns its own storage consumption cost — at install the consuming admin gets a pay-as-you-go billing step.</div>`
       : `<div class="card"><b>DocuFlow chooses “Owner org” (standard)</b> so the developer is in charge of billing — the consuming admin has <b>no billing step</b> at install.</div>`}`),
  cta:"Continue ↓"},

/* 2 */ {phase:1, rail:"Create app — confirm & create", tab:"SharePoint admin center",
  url:`<b>admin.microsoft.com</b>/sharepoint &nbsp;›&nbsp; Apps › Create app`,
  body: spacApps(true, createPanelBottom()),
  note: noteCard("tag:Owning tenant — Fabrikam","Billing setup",
    `${pass

     <div class="card green"><b>Click “Accept permissions”.</b></div>`),
  cta:"Accept permissions"},

/* 12 */ {phase:3, rail:"Onboarding completes — container type registered", tab:"Microsoft 365 admin center",
  url:`<b>admin.microsoft.com</b> &nbsp;›&nbsp; Integrated apps › Deploy new app › Finish`,
  body: macWizard(3),
  note: noteCard("tag:Consuming tenant — Contoso","Deploy new app · 3 of 3",
    `<div class="card green"><b>Onboarding completes inside the same flow</b> — no PowerShell, no out-of-band step.</div>

         <div class="card">Installing didn't require billing, but the app <b>can't be used</b> until it's set up.</div>`),

         <div class="card"><b>Standard apps skip this entirely</b> — try the header toggle to compare.</div>`),
      cta: billingSet ? "Continue →" : "Set up billing"});
  } else {
    BILLING_INDEX = -1;
  }

  S.push({phase:3, rail: (pass && !billingSet) ? "Installed — billing required to use" : "Installed — DocuFlow is live", tab:"Done",
    url:`<b>docuflow.fabrikam.com</b> · installed in ${APP.consumer}`,
    body: doneScreen(),
    note: doneNote(),
    cta:"↺ Restart prototype"});

  return S;
}

function spacApps(withScrim, panel, createTarget){

    ["Application_SPE_0024","External org","User org","Active"],
    ["Northwind Vault","External org","Owner org","Active"]

  const isNew = panel && panel.indexOf("Create app")>-1;
  const detail = panel && panel.indexOf("Entra app ID")>-1;
  if(detail){ rows.unshift([APP.name,"Your org",billingTypeLabel(),"Active",true]); }
  const inner = `

    <div class="muted">Install, set up, and manage your SharePoint Embedded apps. <a class="lnk">Learn more</a></div>
    <div class="tabs"><div class="t">Installed apps</div><div class="t on">Owned apps</div></div>

        <td><span class="av">${r[0][0]}</span></td><td><span class="pill">${r[3]}</span></td></tr>`).join("")}

  return adminShell('apps', inner, panel);
}

function appDetailPanel(stage){

  const dev = stage==='dev';
  const statusPill = ready ? `<span class="pill">Ready</span>` : `<span class="warnpill">In development</span>`;
  const emailBtn = stage==='reg'
    ? `<button class="btn primary" onclick="adv()">✉ Email app details to owners</button>`
    : `<button class="btn">✉ Email app details to owners</button>`;
  let publishSection;
  if(ready){
    publishSection = `<div class="field"><label>Publish to Microsoft Marketplace</label>
         <div class="okbar"><b>All prerequisites met — this app is eligible to publish.</b></div>
         <ul class="prereq">
           <li><b>✔</b> Multi-tenant Entra app registered</li>
           <li><b>✔</b> Standard (non-trial) container type defined (${APP.ctName})</li>
           <li><b>✔</b> Billing model set (${billingTypeLabel()})${p?'':' + Azure subscription connected'}</li>

           <li><b>✔</b> App developed & marked <b>Ready</b></li>
         </ul>
         <div class="infobox"><b>Who can publish?</b> Marking Ready → <b>SharePoint Embedded Administrator</b> (no Global Admin needed). Creating the listing → <b>Partner Center</b> role (<b>Publisher / Developer</b>).</div></div>
       <div class="acts"><button class="btn primary" onclick="adv()">Publish to Marketplace</button></div>`;
  } else if(dev){

         <div class="kv"><b>State:</b> <span class="warnpill">In development</span></div>
         <div class="infobox">Mark the app <b>Ready</b> once development and configuration are complete. This makes it eligible to publish to Marketplace (requires a <b>standard, non-trial container type</b> — not multi-geo).</div></div>

     <div class="infobox">Hand off the app so owners and other developers can build on it — email them the Entra app ID, SPE app ID, container type and billing model.</div>
     ${stage==='reg' ? '' : emailBtn}</div>
   <div class="field"><label>Billing</label>
     <div class="kv"><b>Billing type:</b> ${billingTypeLabel()} ${p?'(direct-to-customer)':'(standard)'}</div>
     <div class="kv"><b>Azure subscription:</b> ${p?'— (set up by the using org)':'Fabrikam-Production (developer-owned)'}</div></div>

/* ===================== notes helper ===================== */
function noteCard(tagSpec, sub, html){
  const tag = tagSpec.startsWith("tag:") ? `<span class="tag">${tagSpec.slice(4)}</span>` : "";
  return `${tag}<h3>${sub}</h3><div class="sub">Step <span id="ncount"></span></div>${html}`;
}

/* ===================== engine ===================== */
let MODE = 'passthrough';   /* 'passthrough' = Direct-to-customer billed · 'standard' = owner/developer billed */
let billingSet = false;     /* pass-through only: has the consuming admin enabled pay-as-you-go billing */
let BILLING_INDEX = -1;
const isPass = ()=> MODE==='passthrough';
const billingTypeLabel = ()=> isPass() ? 'User org' : 'Owner org';
let cur = 0;
let SCREENS = buildScreens();

function adv(){ go(cur+1); }
function restart(){ billingSet = false; go(0); }
function setBilling(v){ billingSet = v; adv(); }
function goBilling(){ SCREENS = buildScreens(); if(BILLING_INDEX >= 0) go(BILLING_INDEX); }
function setMode(m){ if(MODE===m) return; MODE = m; billingSet = false; cur = 0; render(); }

function go(i){ SCREENS = buildScreens(); cur = Math.max(0, Math.min(SCREENS.length-1, i)); render(); }
function render(){
  SCREENS = buildScreens();
  cur = Math.max(0, Math.min(SCREENS.length-1, cur));
  const s = SCREENS[cur];
  document.getElementById('url').innerHTML = s.url;
  document.getElementById('screen').innerHTML = s.body;
  document.getElementById('notes').innerHTML = s.note;
  const nc = document.getElementById('ncount'); if(nc) nc.textContent = `${cur+1} of ${SCREENS.length}`;
  document.getElementById('bar').style.width = ((cur+1)/SCREENS.length*100)+'%';
  document.getElementById('counter').textContent = `Step ${cur+1} / ${SCREENS.length}`;
  document.getElementById('back').disabled = cur===0;
  const nx = document.getElementById('next');
  nx.textContent = cur===SCREENS.length-1 ? "↺ Restart" : (s.cta || "Next →");

  // mode switch active state
  document.querySelectorAll('#modeswitch button').forEach(b=> b.classList.toggle('on', b.dataset.m===MODE));

  // phases
  document.getElementById('phases').innerHTML = PHASE_LABELS.map((p,idx)=>{
    const ph = idx+1;
    const cls = s.phase===ph ? "active" : (s.phase>ph ? "done":"");
    return `<span class="pchip ${cls}">${p}</span>`;
  }).join("");

  // rail
  document.getElementById('rail').innerHTML = railHTML();
}
function railHTML(){
  let html="", lastPhase=0;
  SCREENS.forEach((s,i)=>{
    if(s.phase!==lastPhase){ html+=`<div class="grp">${PHASE_LABELS[s.phase-1]}</div>`; lastPhase=s.phase; }
    const cls = i===cur?"active":(i<cur?"done":"");
    const mark = i<cur?"✓":(i+1);
    html+=`<div class="step ${cls}" onclick="go(${i})"><span class="dot">${mark}</span><span class="lbl">${s.rail}</span></div>`;
  });
  return html;
}
document.querySelectorAll('#modeswitch button').forEach(b=> b.onclick = ()=> setMode(b.dataset.m));
document.getElementById('next').onclick = ()=> cur===SCREENS.length-1 ? restart() : adv();
document.getElementById('back').onclick = ()=> go(cur-1);
document.getElementById('restart').onclick = ()=> restart();
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') go(cur+1);
  if(e.key==='ArrowLeft') go(cur-1);
});
render();
</script>
